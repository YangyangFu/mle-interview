project:
  type: website
  output-dir: docs

# Notebooks ship with their stored outputs; don't re-execute heavy
# (torch / distributed) code at render time.
execute:
  enabled: false

website:
  title: "MLE Interview Prep"
  description: "ML coding & problem-solving notes for machine-learning engineer interviews."
  search:
    location: sidebar
    type: textbox
  page-navigation: true
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: matrix_calculus.qmd
        text: Foundations
      - text: ML Coding
        href: ml-coding/1-linear-regression.ipynb
    tools:
      - icon: github
        href: https://github.com/
  sidebar:
    style: docked
    search: true
    contents:
      - href: index.qmd
        text: Overview
      - section: "Foundations"
        contents:
          - href: matrix_calculus.qmd

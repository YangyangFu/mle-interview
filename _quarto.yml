            text: Naive Bayes
          - href: gaussian-mixture.ipynb
            text: Gaussian Mixture Models
      - section: "Classical ML"
        contents:
          - href: ml-coding/1-linear-regression.ipynb
            text: Linear Regression
          - href: ml-coding/2-logistic-regression.ipynb
            text: Logistic Regression
          - href: ml-coding/3-softmax-regression.ipynb
            text: Softmax Regression
          - href: ml-coding/4-knn.ipynb
            text: K-Nearest Neighbors

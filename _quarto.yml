project:
  type: website
  output-dir: docs

# Notebooks ship with their stored outputs; don't re-execute heavy
# (torch / distributed) code at render time.
execute:
  enabled: false

website:
  title: "MLE Interview Prep"
  description: "ML coding & problem-solving notes for machine-learning engineer interviews."
  search:
    location: sidebar
    type: textbox
  page-navigation: true
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: ml-coding/foundations/matrix_calculus.qmd
        text: Foundations
      - text: ML Coding
        href: ml-coding/classical-ml/linear-regression.ipynb
    tools:
      - icon: github
        href: https://github.com/
  sidebar:
    style: docked
    search: true
    contents:
      - href: index.qmd
        text: Overview
      - section: "Foundations"
        contents:
          - href: ml-coding/foundations/matrix_calculus.qmd
            text: Matrix Calculus
      - section: "Classical ML"
        contents:
          - href: ml-coding/classical-ml/linear-regression.ipynb
            text: Linear Regression
          - href: ml-coding/classical-ml/logistic-regression.ipynb
            text: Logistic Regression
          - href: ml-coding/classical-ml/softmax-regression.ipynb
            text: Softmax Regression
          - href: ml-coding/classical-ml/knn.ipynb
            text: K-Nearest Neighbors
          - href: ml-coding/classical-ml/decision-tree.ipynb
            text: Decision Tree
          - href: ml-coding/classical-ml/kmeans.ipynb
            text: K-Means
          - href: ml-coding/classical-ml/principal-component-analysis.ipynb
            text: Principal Component Analysis
          - href: ml-coding/classical-ml/naive-bayes.ipynb
            text: Naive Bayes
          - href: ml-coding/classical-ml/gaussian-mixture.ipynb
            text: Gaussian Mixture Models
      - section: "Deep Learning"
        contents:
          - href: ml-coding/deep-learning/ann.ipynb
            text: Artificial Neural Networks
          - href: ml-coding/deep-learning/convolution.ipynb
            text: Convolution
          - href: ml-coding/deep-learning/deep-learning-basic.ipynb
            text: Basic Modules
          - href: ml-coding/deep-learning/sampling.ipynb
            text: Sampling Methods
          - href: ml-coding/deep-learning/loss-function.ipynb
            text: Loss Functions
          - href: ml-coding/deep-learning/optimizer.ipynb
            text: Optimizers
          - href: ml-coding/deep-learning/training.ipynb
            text: Training Loops
      - section: "Reinforcement Learning"
        contents:
          - href: ml-coding/reinforcement-learning/reinforcement-learning.ipynb
            text: Reinforcement Learning
      - section: "LLMs"
        contents:
          - href: ml-coding/llms/transformer.ipynb
            text: Transformer
          - href: ml-coding/llms/llama.ipynb
            text: LLaMA
      - section: "Generative Models"
        contents:
          - href: ml-coding/generative-models/diffusion.ipynb
            text: Diffusion & Flow Matching
          - href: ml-coding/generative-models/vq-vae.ipynb
            text: VQ-VAE
      - section: "Applied ML"
        contents:
          - href: ml-coding/applied-ml/ensembling.ipynb
            text: Ensemble Learning
          - href: ml-coding/applied-ml/deployment-basics.ipynb
            text: Deployment Basics
          - href: ml-coding/applied-ml/distributed-training-pipeline.ipynb
